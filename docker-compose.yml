services:
  frontend:
    build: ./htmlstarter
    container_name: htmlstarter
    ports:
      - "3000:3000"
    restart: unless-stopped
    profiles:
      - dev
    networks:
      - web

  backend:
    build: ./express_helloworld
    container_name: express_helloworld
    ports:
      - "8001:8001"
    restart: unless-stopped
    profiles:
      - dev
    networks:
      - web

  frontend-prod:
    build: ./htmlstarter
    container_name: htmlstarter-prod
    expose:
      - "3000"
    restart: unless-stopped
    profiles:
      - prod
    networks:
      - web

  backend-prod:
    build: ./express_helloworld
    container_name: express_helloworld-prod
    expose:
      - "8001"
    restart: unless-stopped
    profiles:
      - prod
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    profiles:
      - prod
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend-prod
      - backend-prod
    networks:
      - web

volumes:
  caddy_data:
  caddy_config:

networks:
  web: